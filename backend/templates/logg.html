
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Check-in/ut-logg</title>
    <style>
        table { border-collapse: collapse; width: 95%; margin: 20px auto; }
        th, td { border: 1px solid #888; padding: 8px; text-align: left; }
        th { background: #d9edf7; }
        tr:nth-child(even) { background: #f7f7f7; }
    </style>
</head>
<body>
    <div style="width: 80%; margin: 30px auto;">
        <h2>Check-in / Check-out Logg</h2>
        <table>
            <tr>
                {% for col in columns %}
                    <th>{{ col }}</th>
                {% endfor %}
            </tr>
            {% for rad in records %}
                <tr>
                    {% for col in columns %}
                        <td>{{ rad[col] }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </table>
        <a href="{{ url_for('admin_panel') }}">Tillbaka till adminpanel</a>
    </div>
</body>
</html>
