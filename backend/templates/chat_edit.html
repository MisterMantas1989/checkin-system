<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Redigera meddelande</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #c6e6f5 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
        }
        .edit-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .edit-box {
            background: #f6fbff;
            border-radius: 22px;
            box-shadow: 0 10px 36px #a4d2e7a8, 0 2px 6px #7bcfff15;
            padding: 44px 38px 30px 38px;
            min-width: 360px;
            max-width: 98vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: box-shadow 0.2s;
        }
        .edit-box:hover {
            box-shadow: 0 14px 44px #b5eaffc9, 0 6px 18px #65b8ff21;
        }
        .edit-box h2 {
            margin-top: 0;
            color: #174273;
            font-size: 2.1rem;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 28px;
            font-weight: 700;
        }
        label {
            display: block;
            color: #2b4e6c;
            font-size: 1.1rem;
            margin-bottom: 7px;
        }
        textarea {
            width: 100%;
            min-height: 80px;
            font-size: 1.08rem;
            border: none;
            border-radius: 13px;
            background: #eaf7fd;
            box-shadow: 0 2px 7px #99dbff3b;
            padding: 12px;
            margin-bottom: 24px;
            outline: none;
            transition: box-shadow 0.2s;
        }
        textarea:focus {
            box-shadow: 0 0 0 2px #5cb0ff88;
        }
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            width: 100%;
        }
        .btn-main {
            background: linear-gradient(90deg, #53a6ec 20%, #5cd7fa 90%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 34px;
            font-size: 1.07rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 12px #7dcfff43;
            letter-spacing: 1px;
            transition: background 0.18s, box-shadow 0.17s, transform 0.09s;
            outline: none;
        }
        .btn-main:hover {
            background: linear-gradient(90deg, #398ada 20%, #34caf2 90%);
            box-shadow: 0 4px 18px #72b9fd54;
            transform: translateY(-1.5px) scale(1.035);
        }
        .back-link {
            color: #49a2f6;
            background: none;
            border: none;
            font-size: 1.06rem;
            padding: 11px 22px;
            border-radius: 10px;
            text-decoration: underline;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.18s, color 0.14s;
        }
        .back-link:hover {
            color: #2263aa;
            background: #e3f2fd;
        }
        @media (max-width: 600px) {
            .edit-box { min-width: 90vw; padding: 18px 6vw 18px 6vw; }
            .action-row { flex-direction: column; gap: 10px; }
            .btn-main, .back-link { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="edit-container">
        <form class="edit-box" method="post">
            <h2>Redigera meddelande</h2>
            <label for="message">Meddelande:</label>
            <textarea id="message" name="message" required>{{ msg.message }}</textarea>
            <div class="action-row">
                <button type="submit" class="btn-main">💾 Spara ändring</button>
                <a href="{{ url_for('chat') }}" class="back-link">↩ Tillbaka</a>
            </div>
        </form>
    </div>
</body>
</html>
