<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Checka ut</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="main-container">
        <!-- SIDOMENY -->
        <div class="sidebar">
            <div class="sidebar-logo-box">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            </div>
            <div class="menu">
                <!-- Här kan du lägga till fler länkar -->
            </div>
        </div>
        <!-- HUVUDINNEHÅLL -->
        <div class="main-content">
            <img src="{{ url_for('static', filename='logo.png') }}" class="logo-large" alt="Logo">
            <h2 class="page-title">Checka ut</h2>
            <div id="mapid" style="height: 300px; width: 100%; margin-bottom: 15px; display:none;"></div>
            <form method="POST">
                <input type="hidden" name="lat" id="lat">
                <input type="hidden" name="lon" id="lon">
                <button type="submit" class="btn-main">Checka ut med adress</button>
            </form>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        if (document.getElementById('lat')) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                document.getElementById('lat').value = lat;
                document.getElementById('lon').value = lon;

                var mapDiv = document.getElementById('mapid');
                mapDiv.style.display = 'block';
                var map = L.map('mapid').setView([lat, lon], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);

                L.marker([lat, lon]).addTo(map)
                    .bindPopup("Din position").openPopup();
            }, function(err){
                alert('Kunde inte hämta GPS-position! Kontrollera platsbehörighet.');
            });
        }
    </script>
</body>
</html>
