<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Städfirma RVL RASA AB - Inloggning</title>
    <style>
        body {
            background: #f7fbfd;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .logo {
            margin-top: 40px;
            width: 260px;
        }
        .login-box {
            margin: 40px auto;
            padding: 30px 30px 20px 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px #0001;
            width: 90%;
            max-width: 340px;
        }
        .input-field {
            width: 80%;
            padding: 10px;
            margin: 10px auto;
            border: 1px solid #bcd;
            border-radius: 6px;
            display: block;
        }
        .btn {
            width: 85%;
            padding: 12px;
            background: #007bc1;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            margin: 15px auto 0 auto;
            cursor: pointer;
        }
        .btn:hover {
            background: #005b90;
        }
    </style>
</head>
<body>
    <img src="logo.png" class="logo" alt="Företagslogga">
    <div class="login-box">
        <h2>Logga in</h2>
        <input class="input-field" type="text" id="fullname" placeholder="För- och efternamn" />
        <input class="input-field" type="tel" id="phone" placeholder="Mobilnummer" />
        <button class="btn" onclick="login()">Logga in</button>
        <div id="login-status"></div>
    </div>
    <script>
        function login() {
            const fullname = document.getElementById('fullname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({fullname, phone})
            }).then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location = "/checkin.html?phone=" + encodeURIComponent(phone);
                } else {
                    document.getElementById('login-status').innerText = data.msg;
                }
            });
        }
    </script>
</body>
</html>
