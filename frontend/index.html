
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Städfirma RVL RASA AB</title>
</head>
<body>
    <h1>Städfirma RVL RASA AB</h1>
    <p>Ange ditt namn och välj om du vill checka in eller checka ut.</p>
    <input type="text" id="nameInput" placeholder="Namn">
    <button onclick="checkIn()">✅ Checka in</button>
    <button onclick="checkOut()">❌ Checka ut</button>
    <p id="result"></p>

    <script>
        const apiUrl = "https://checkin-system-fcg0.onrender.com";

        function sendRequest(type) {
            const name = document.getElementById("nameInput").value;
            fetch(`${apiUrl}/${type}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerHTML = "✅ " + data.message;
            })
            .catch(err => {
                document.getElementById("result").innerHTML = "❌ Ett fel uppstod vid kommunikation med servern.";
            });
        }

        function checkIn() { sendRequest("checkin"); }
        function checkOut() { sendRequest("checkout"); }
    </script>
</body>
</html>
