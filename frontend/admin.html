
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Adminpanel - Städfirma RVL RASA AB</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f0f0f0; }
        .header { font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">📋 Adminpanel – Alla in/ut-checkningar</div>
    <label for="date">Välj datum:</label>
    <input type="date" id="date" />
    <button onclick="fetchLogs()">Hämta loggar</button>
    <table id="logTable">
        <thead>
            <tr>
                <th>Typ</th>
                <th>Namn</th>
                <th>Tidpunkt</th>
                <th>Latitud</th>
                <th>Longitud</th>
                <th>Total tid</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

<script src="admin.js"></script>
</body>
</html>
