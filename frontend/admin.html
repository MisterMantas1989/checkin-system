
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Adminpanel - Städfirma RVL RASA AB</title>
</head>
<body>
    <h1>Adminpanel</h1>
    <button onclick="load()">🔄 Uppdatera lista</button>
    <ul id="list"></ul>

    <script>
        const apiUrl = "https://checkin-system-fcg0.onrender.com";

        function load() {
            fetch(`${apiUrl}/list`)
            .then(res => res.json())
            .then(data => {
                const ul = document.getElementById("list");
                ul.innerHTML = "";
                data.forEach(item => {
                    const li = document.createElement("li");
                    li.textContent = item;
                    ul.appendChild(li);
                });
            })
            .catch(() => {
                document.getElementById("list").innerHTML = "<li>❌ Kunde inte hämta data</li>";
            });
        }
    </script>
</body>
</html>
